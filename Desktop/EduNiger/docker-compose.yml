version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: eduniger_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: gestion_scolaire
      MYSQL_USER: eduniger
      MYSQL_PASSWORD: eduniger123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: eduniger_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: eduniger
      DB_PASS: eduniger123
      DB_NAME: gestion_scolaire
      JWT_SECRET: CHANGEZ_EN_PRODUCTION_CLE_LONGUE_ET_ALEATOIRE
      JWT_EXPIRE: 7d
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: eduniger_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  uploads_data:
